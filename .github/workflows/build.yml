name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Docker image
        run: docker build -t yourbookapp .
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## YourBookApp

            ### Docker

            ```sh
            docker pull ghcr.io/barontrump/yourbookapp:latest
            docker run -p 3000:3000 ghcr.io/barontrump/yourbookapp
            ```

            ### Local Dev

            ```sh
            npm install
            npm run dev
            ```
